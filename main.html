<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind & DaisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <title>Issue Tracker</title>
</head>

<body class="bg-slate-100">

  <!-- Navbar -->
  <header class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="navbar px-0 min-h-[72px] flex-col gap-4 lg:flex-row">

        <div class="flex items-center gap-3 flex-1 w-full lg:w-auto">
          <img src="assets/github-logo.png" class="w-8 h-8" alt="GitHub Logo" />
          <h1 class="text-xl font-bold text-slate-800">GitHub Issues Tracker</h1>
        </div>

        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full lg:w-auto">
          <label class="input input-bordered flex items-center gap-2 w-full sm:w-72 md:w-80">
            <i class="fa-brands fa-sistrix"></i>
            <input id="searchInput" type="search" class="grow" placeholder="Search issues..." />
          </label>

          <button class="btn btn-primary whitespace-nowrap">+ New Issue</button>
        </div>

      </div>
    </div>
  </header>

  <!-- Main Section -->
  <main class="py-6 sm:py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <!-- Tabs -->
      <div class="bg-white rounded-2xl p-4 shadow-sm mb-6">
        <div class="flex flex-wrap gap-3">
          <button id="allBtn"
            class="px-6 py-2 rounded-lg text-white bg-gradient-to-r from-violet-700 to-purple-600 font-medium">
            All
          </button>

          <button id="openBtn" class="px-6 py-2 rounded-lg border border-slate-300 text-slate-600 bg-white font-medium">
            Open
          </button>

          <button id="closedBtn"
            class="px-6 py-2 rounded-lg border border-slate-300 text-slate-600 bg-white font-medium">
            Closed
          </button>
        </div>
      </div>

      <!-- Issue Summary + Cards -->
      <section class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div
          class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 p-5 sm:p-6 border-b border-slate-200">
          <div class="flex items-center gap-2">
            <img src="assets/Aperture.png" alt="Issue Icon" class="w-11 h-11 object-contain" />

            <div>
              <h3 id="issueCount" class="text-2xl font-bold text-slate-800">50 Issues</h3>
              <p class="text-slate-500 text-sm mt-1">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex items-center gap-4 text-sm text-slate-700">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
              <span>Open</span>
            </div>

            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-violet-500 inline-block"></span>
              <span>Closed</span>
            </div>
          </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 p-4 sm:p-6"></div>
      </section>

    </div>
  </main>

  <script src="main.js"></script>
</body>

</html>
