<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- TailWind & DaisyUi CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Font awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Google font CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
  <title>Issue Tracker</title>
</head>

<body>
  <main class="min-h-screen bg-slate-100 flex items-center justify-center">
    <div class="card w-[520px] max-w-md bg-white shadow-xl border border-slate-200 rounded-2xl">
      <div class="card-body p-8">
        <!-- Logo -->
        <div class="flex justify-center">
          <img src="/assets/github-logo.png" alt="">
        </div>
        <!-- Title -->
        <div class="text-center">
          <h2 class="text-[30px] font-bold text-slate-800">
            GitHub Issues Tracker
          </h2>
          <p class="text-slate-500 mt-2 text-lg">
            Sign in to manage your issues
          </p>
        </div>

        <section>
          <!-- Form section-->
          <form id="login_Form" class="space-y-5">
            <div>
              <label class="label px-0 py-2">
                <span class="label-text text-slate-800 font-semibold text-lg">Username</span>
              </label>
              <input id="user_name" type="text" placeholder="Enter Username"
                class="input input-bordered w-full h-10 text-base rounded" />
              <p class="text-sm text-indigo-600 mt-2">Default: admin</p>
            </div>

            <div>
              <label class="label px-0 py-2">
                <span class="label-text text-slate-800 font-semibold text-lg">Password</span>
              </label>
              <input id="password" type="password" placeholder="Enter Password"
                class="input input-bordered w-full h-10 text-base rounded" />
              <p id="error_message" class="text-red-500 text-sm"></p>
              <p class="text-sm text-indigo-600 mt-2">Default: admin123</p>
            </div>

            <button type="submit"
              class="btn w-full border-0 text-white text-xl font-semibold rounded bg-gradient-to-r from-violet-700 to-purple-600 hover:from-violet-800 hover:to-purple-700">
              Sign In
            </button>
          </form>
        </section>

        <!-- Divider -->
        <div class="divider text-slate-500 my-6">OR</div>
        <!-- Demo Credentials section -->
        <section>
          <div class="bg-slate-100 rounded-xl p-6 text-center">
            <p class="text-slate-500 mb-4">Demo Credentials:</p>
            <p class="text-base text-slate-800">
              <span class="font-bold">Username:</span> admin
            </p>
            <p class="text-base text-slate-800">
              <span class="font-bold">Password:</span> admin123
            </p>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
